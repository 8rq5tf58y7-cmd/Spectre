<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RTX Converter</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --card: #2a2a3c;
      --input: #33334d;
      --fg: #cdd6f4;
      --dim: #7f849c;
      --accent: #89b4fa;
      --green: #a6e3a1;
      --red: #f38ba8;
      --border: #45475a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 16px;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 16px) max(env(safe-area-inset-right), 16px) max(env(safe-area-inset-bottom), 16px) max(env(safe-area-inset-left), 16px);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      color: var(--fg);
    }
    .subtitle {
      color: var(--dim);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .file-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }
    .file-zone:hover, .file-zone.dragover {
      border-color: var(--accent);
      background: rgba(137, 180, 250, 0.08);
    }
    .file-zone input { display: none; }
    .file-name {
      color: var(--accent);
      font-weight: 500;
      word-break: break-all;
      margin-top: 0.5rem;
    }
    .file-name.empty { color: var(--dim); }
    .btn {
      display: block;
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      margin-top: 1rem;
    }
    .btn-primary:hover:not(:disabled) {
      background: #b4d0fb;
    }
    .log {
      background: var(--input);
      border-radius: 8px;
      padding: 1rem;
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log:empty::before { content: "Log output…"; color: var(--dim); }
    .log .err { color: var(--red); }
    .log .ok { color: var(--green); }
    .downloads {
      margin-top: 1rem;
    }
    .downloads h3 {
      font-size: 0.95rem;
      margin: 0 0 0.5rem;
      color: var(--dim);
    }
    .download-link {
      display: block;
      padding: 0.6rem 1rem;
      margin-bottom: 0.4rem;
      background: var(--input);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .download-link:hover { background: var(--border); }
    .status {
      padding: 0.75rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .status.loading {
      background: rgba(137, 180, 250, 0.15);
      color: var(--accent);
    }
    .status.error {
      background: rgba(243, 139, 168, 0.15);
      color: var(--red);
    }
    .status.success {
      background: rgba(166, 227, 161, 0.15);
      color: var(--green);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>RTX Converter</h1>
    <p class="subtitle">Bruker EDS .rtx → EMSA/MSA, CSV, metadata</p>

    <div id="statusInit" class="status loading">
      Loading Python runtime… (first load: 1–2 min, ~15 MB)
    </div>

    <div id="main" class="hidden">
      <div class="card">
        <div id="fileZone" class="file-zone" role="button" tabindex="0">
          <input type="file" id="fileInput" />
          <div>Tap to select .rtx file</div>
          <div id="fileName" class="file-name empty">No file selected</div>
        </div>

        <button id="btnConvert" class="btn btn-primary" disabled>
          Convert
        </button>
      </div>

      <div id="statusConvert" class="status hidden"></div>
      <div id="downloads" class="downloads hidden"></div>

      <div class="card">
        <h3 style="margin:0 0 0.5rem;font-size:0.95rem;color:var(--dim)">Log</h3>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>

  <script type="module">
    const logEl = document.getElementById('log');
    const fileInput = document.getElementById('fileInput');
    const fileZone = document.getElementById('fileZone');
    const fileName = document.getElementById('fileName');
    const btnConvert = document.getElementById('btnConvert');
    const statusInit = document.getElementById('statusInit');
    const statusConvert = document.getElementById('statusConvert');
    const main = document.getElementById('main');
    const downloads = document.getElementById('downloads');

    function log(msg, cls = '') {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = msg + '\n';
      logEl.appendChild(span);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logEl.innerHTML = '';
    }

    let pyodide = null;
    let selectedFile = null;

    fileInput.addEventListener('click', (e) => e.stopPropagation());
    fileZone.addEventListener('click', () => fileInput.click());
    fileZone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
    fileZone.addEventListener('dragover', (e) => { e.preventDefault(); fileZone.classList.add('dragover'); });
    fileZone.addEventListener('dragleave', () => fileZone.classList.remove('dragover'));
    fileZone.addEventListener('drop', (e) => {
      e.preventDefault();
      fileZone.classList.remove('dragover');
      const f = e.dataTransfer?.files?.[0];
      if (f && f.name.toLowerCase().endsWith('.rtx')) {
        setFile(f);
      } else if (f) {
        fileName.textContent = 'Please select an .rtx file';
        fileName.classList.add('empty');
      }
    });
    fileInput.addEventListener('change', () => {
      const f = fileInput.files?.[0];
      if (f && f.name.toLowerCase().endsWith('.rtx')) {
        setFile(f);
      } else if (f) {
        fileName.textContent = 'Please select an .rtx file';
        fileName.classList.add('empty');
      }
    });

    function setFile(f) {
      selectedFile = f;
      fileName.textContent = f.name;
      fileName.classList.remove('empty');
      btnConvert.disabled = !pyodide;
    }

    async function initPyodide() {
      const CDNS = [
        'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/',
        'https://unpkg.com/pyodide@0.25.1/full/'
      ];
      for (const indexURL of CDNS) {
        try {
          const cdnLabel = indexURL.includes('jsdelivr') ? 'jsdelivr' : 'unpkg';
          statusInit.textContent = `Loading Python… (${cdnLabel})`;
          const { loadPyodide } = await Promise.race([
            import(indexURL + 'pyodide.mjs'),
            new Promise((_, rej) => setTimeout(() => rej(new Error('Module load timeout')), 30000))
          ]);
          const py = await Promise.race([
            loadPyodide({ indexURL }),
            new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout after 2 min')), 120000))
          ]);
          log('Fetching converter…');
          const resp = await fetch('rtx_converter.py');
          if (!resp.ok) throw new Error(`rtx_converter.py: ${resp.status}`);
          const code = await resp.text();
          py.FS.writeFile('/tmp/rtx_converter.py', code);
          py.runPython('import sys; sys.path.insert(0, "/tmp"); from rtx_converter import convert_rtx_file');
          log('Ready.', 'ok');
          pyodide = py;
          statusInit.classList.add('hidden');
          main.classList.remove('hidden');
          btnConvert.disabled = !selectedFile;
          return;
        } catch (e) {
          log(`Try failed (${indexURL.includes('jsdelivr') ? 'jsdelivr' : 'unpkg'}): ${e.message}`, 'err');
          if (indexURL === CDNS[CDNS.length - 1]) {
            statusInit.textContent = 'Failed: ' + e.message + ' — Try a different network or host.';
            statusInit.classList.remove('loading');
            statusInit.classList.add('error');
          }
        }
      }
    }

    btnConvert.addEventListener('click', async () => {
      if (!pyodide || !selectedFile) return;
      clearLog();
      statusConvert.classList.add('hidden');
      downloads.classList.add('hidden');
      downloads.innerHTML = '';
      btnConvert.disabled = true;
      log('Reading file…');

      try {
        const buf = await selectedFile.arrayBuffer();
        const bytes = new Uint8Array(buf);
        log(`Loaded ${(bytes.length / 1024).toFixed(1)} KB`);

        statusConvert.textContent = 'Converting…';
        statusConvert.className = 'status loading';
        statusConvert.classList.remove('hidden');

        // Clean previous output directory so stale files don't persist
        try {
          const prev = pyodide.FS.readdir('/tmp/out');
          for (const n of prev) {
            if (n === '.' || n === '..') continue;
            try { pyodide.FS.unlink('/tmp/out/' + n); } catch (e) {
              log('Cleanup: could not remove ' + n + ': ' + e.message, 'err');
            }
          }
        } catch (_) { /* directory may not exist yet – OK */ }

        pyodide.FS.writeFile('/tmp/input.rtx', bytes);
        pyodide.runPython(`
import sys, os
from io import StringIO
_buf = StringIO()
sys.stdout = _buf
sys.stderr = _buf
try:
    _ok = convert_rtx_file('/tmp/input.rtx', '/tmp/out')
    print('DONE' if _ok else 'FAIL')
except Exception as _e:
    import traceback
    traceback.print_exc()
    print('FAIL')
finally:
    sys.stdout = sys.__stdout__
    sys.stderr = sys.__stderr__
    with open('/tmp/log.txt','w') as _f:
        _f.write(_buf.getvalue())
`);
        const logTxt = pyodide.FS.readFile('/tmp/log.txt', { encoding: 'utf8' });
        log(logTxt);

        const outFiles = [];
        try {
          const names = pyodide.FS.readdir('/tmp/out');
          for (const n of names) {
            if (n === '.' || n === '..') continue;
            const path = '/tmp/out/' + n;
            const stat = pyodide.FS.stat(path);
            if (pyodide.FS.isFile(stat.mode)) {
              const data = pyodide.FS.readFile(path);
              outFiles.push({ name: n, data });
            }
          }
        } catch (fsErr) {
          log('File read error: ' + fsErr.message, 'err');
        }

        if (outFiles.length > 0) {
          statusConvert.textContent = `Converted ${outFiles.length} file(s)`;
          statusConvert.className = 'status success';
          const dl = document.createElement('h3');
          dl.textContent = 'Download';
          downloads.appendChild(dl);
          for (const { name, data } of outFiles) {
            const a = document.createElement('a');
            a.className = 'download-link';
            a.textContent = name;
            a.download = name;
            a.href = URL.createObjectURL(new Blob([data]));
            downloads.appendChild(a);
          }
          downloads.classList.remove('hidden');
        } else {
          statusConvert.textContent = 'Conversion failed — see log';
          statusConvert.className = 'status error';
        }
      } catch (e) {
        log('Error: ' + e.message, 'err');
        statusConvert.textContent = 'Error: ' + e.message;
        statusConvert.className = 'status error';
        statusConvert.classList.remove('hidden');
      }
      btnConvert.disabled = false;
    });

    initPyodide();
  </script>
</body>
</html>
